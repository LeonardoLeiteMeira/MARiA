repos:
  - repo: local
    hooks:
      - id: mypy-poetry
        name: mypy (via Poetry env)
        entry: env POETRY_VIRTUALENVS_USE_POETRY_PYTHON=true poetry run python -m mypy src
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        verbose: true
      - id: poetry-check
        name: poetry check (system env)
        entry: poetry check
        language: system
        pass_filenames: false
